<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyOps Pilot Checklist | Professional</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#020617">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SkyOps">
    
    <!-- Link Manifest via Data URI (Crucial for Single File Installability) -->
    <link id="pwa-manifest" rel="manifest">
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1maWW9xYa_TOAVTu_aiDmFZ5zX0U_e3DF">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1maWW9xYa_TOAVTu_aiDmFZ5zX0U_e3DF">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #0ea5e9; --emergency: #ef4444; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        
        .model-card { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.4), rgba(2, 6, 23, 0.8)); 
            border: 1px solid rgba(255,255,255,0.08); 
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            cursor: pointer; 
        }
        .model-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.1); }
        
        .type-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .type-btn:hover { background: rgba(14, 165, 233, 0.1); border-color: var(--primary); transform: scale(1.02); }
        .type-btn.active { background: rgba(14, 165, 233, 0.2); border-color: var(--primary); box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }

        .tab-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s; position: relative; }
        .tab-btn.emergency::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background: var(--emergency); }
        .tab-btn.normal::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background: var(--primary); }
        
        .hide { display: none !important; }
        .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        .login-input { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); color: white; transition: border-color 0.3s; }
        .login-input:focus { border-color: var(--primary); outline: none; }

        .install-pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(14, 165, 233, 0); } 100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); } }
    </style>
</head>
<body class="no-scrollbar">

    <!-- Opening Screen -->
    <div id="opening-screen" class="fixed inset-0 z-[1000] bg-[#020617] flex flex-col items-center justify-center text-center px-4">
        <h1 class="font-orbitron text-4xl font-bold tracking-[0.3em] text-white">SKYOPS</h1>
        <p id="opening-subtitle" class="font-orbitron text-[10px] tracking-[0.4em] text-sky-500 uppercase mt-2 opacity-0 text-center">Pilot Checklist System</p>
        <div class="w-48 h-[1px] bg-slate-900 mt-10 overflow-hidden rounded-full"><div id="boot-bar" class="w-0 h-full bg-sky-500 shadow-[0_0_10px_#0ea5e9]"></div></div>
    </div>

    <div id="app" class="opacity-0 min-h-screen pt-20 pb-10">
        <!-- Header Navigation -->
        <nav class="fixed top-0 inset-x-0 h-16 glass z-50 flex items-center justify-between px-6">
            <span class="font-orbitron font-bold text-lg tracking-tighter uppercase cursor-pointer" onclick="switchPage('library')">SKYOPS</span>
            
            <div class="flex items-center gap-3 sm:gap-6 text-[10px] font-bold uppercase tracking-widest">
                <!-- User Links -->
                <div id="user-nav" class="flex gap-3 sm:gap-6 items-center">
                    <button onclick="switchPage('library')" id="nav-library" class="nav-link active">Library</button>
                    <button onclick="fetchData()" class="text-slate-500 hover:text-sky-400 p-1" title="Sync Data">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <!-- Tombol Install muncul otomatis jika kriteria PWA terpenuhi -->
                    <button id="install-btn" class="hide bg-sky-600/20 text-sky-400 px-3 py-1 rounded border border-sky-500/30 install-pulse">Install App</button>
                    <button onclick="switchPage('login')" id="nav-login" class="text-slate-500 hover:text-white px-3 py-1 border border-white/10 rounded-md">Admin</button>
                </div>
                
                <!-- Admin Links -->
                <div id="admin-nav" class="hide flex gap-4 sm:gap-6 items-center">
                    <button onclick="switchPage('documents')" id="nav-documents" class="nav-link">Databank</button>
                    <button onclick="switchPage('add')" id="nav-add" class="nav-link">Initialize</button>
                    <button onclick="handleLogout()" class="text-red-500 hover:text-red-400">Logout</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6">
            <!-- PAGE: LIBRARY -->
            <div id="page-library" class="space-y-12">
                <div id="selection-model" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto pt-10">
                    <div onclick="selectFleetModel('Helicopter')" class="model-card p-16 rounded-3xl text-center">
                        <h3 class="font-orbitron text-3xl font-bold tracking-widest uppercase text-white">HELICOPTER</h3>
                        <p class="text-[10px] text-slate-500 uppercase mt-4 tracking-[0.3em]">Rotary Wing Fleet</p>
                    </div>
                    <div onclick="selectFleetModel('Fixedwing')" class="model-card p-16 rounded-3xl text-center">
                        <h3 class="font-orbitron text-3xl font-bold tracking-widest uppercase text-white">FIXEDWING</h3>
                        <p class="text-[10px] text-slate-500 uppercase mt-4 tracking-[0.3em]">Fixed Wing Fleet</p>
                    </div>
                </div>

                <div id="selection-type" class="hide space-y-8">
                    <div class="flex items-center justify-between max-w-5xl mx-auto">
                        <button onclick="resetFleetModel()" class="text-[10px] font-bold text-slate-500 hover:text-sky-400 uppercase tracking-widest flex items-center gap-2">← Back</button>
                        <h2 id="type-selection-title" class="font-orbitron text-sm font-bold text-sky-500 tracking-[0.2em] uppercase">Select Aircraft</h2>
                    </div>
                    <div id="type-button-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 max-w-5xl mx-auto"></div>
                </div>

                <div id="checklist-results" class="hide space-y-10">
                    <div class="max-w-5xl mx-auto border-t border-white/5 pt-8">
                        <div id="res-emergency" class="mb-12">
                            <h2 class="font-orbitron text-red-500 text-[10px] font-bold mb-6 uppercase tracking-[0.3em]">Emergency Protocols</h2>
                            <div id="emergency-tabs" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
                        </div>
                        <div id="res-normal">
                            <h2 class="font-orbitron text-sky-500 text-[10px] font-bold mb-6 uppercase tracking-[0.3em]">Normal Checklist</h2>
                            <div id="normal-tabs" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PAGE: LOGIN -->
            <div id="page-login" class="hide max-w-md mx-auto pt-20">
                <div class="glass p-10 rounded-3xl space-y-8 shadow-2xl">
                    <div class="text-center space-y-2">
                        <h2 class="font-orbitron text-2xl font-bold tracking-widest uppercase">Admin Login</h2>
                        <p class="text-[9px] text-slate-500 uppercase tracking-widest text-center">Secure Database Access</p>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="login-u" class="w-full login-input rounded-xl px-4 py-3 text-sm" placeholder="Username">
                        <input type="password" id="login-p" class="w-full login-input rounded-xl px-4 py-3 text-sm" placeholder="Password">
                        <button onclick="handleLogin()" class="w-full bg-sky-600 hover:bg-sky-500 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em]">Log In</button>
                    </div>
                    <button onclick="switchPage('library')" class="w-full text-[9px] text-slate-500 uppercase tracking-widest hover:text-white">Cancel</button>
                </div>
            </div>

            <!-- PAGE: DATABANK (Admin) -->
            <div id="page-documents" class="hide space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="font-orbitron text-xl font-bold uppercase tracking-widest text-slate-200">Registry Databank</h2>
                    <button onclick="switchPage('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest shadow-lg shadow-sky-900/20">+ Add Record</button>
                </div>
                <div class="glass rounded-2xl overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white/5 text-[10px] uppercase font-bold text-slate-500">
                            <tr><th class="p-4">Reference</th><th class="p-4">Title</th><th class="p-4 text-right">Action</th></tr>
                        </thead>
                        <tbody id="document-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- PAGE: INITIALIZE (Admin) -->
            <div id="page-add" class="hide max-w-3xl mx-auto">
                <div class="glass rounded-3xl p-8 space-y-6 relative border border-white/10 shadow-2xl">
                    <button onclick="switchPage('documents')" class="absolute top-6 right-6 text-slate-500 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <h2 id="form-heading" class="font-orbitron text-2xl font-bold text-center tracking-widest uppercase text-slate-100">Initialize Protocol</h2>
                    <form id="protocol-form" class="space-y-4">
                        <input type="hidden" id="form-id">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Fleet Model</label>
                                <select id="form-aircraft-model" required onchange="updateFormTypeOptions(this.value)" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500 text-sm">
                                    <option value="" disabled selected>Select</option>
                                    <option value="Helicopter">Helicopter</option>
                                    <option value="Fixedwing">Fixedwing</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Fleet Type</label>
                                <select id="form-aircraft-type-select" onchange="checkManualType(this.value)" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500 text-sm">
                                    <option value="" disabled selected>Select</option>
                                </select>
                                <input type="text" id="form-aircraft-type-manual" placeholder="Manual Type" class="hide w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 mt-2 outline-none text-sm">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="form-section" placeholder="Section Name" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm">
                            <select id="form-type" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm">
                                <option value="Normal">Normal Operation</option>
                                <option value="Emergency">Emergency Phase</option>
                            </select>
                        </div>
                        <input type="text" id="form-title" placeholder="Procedure Title" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm">
                        <textarea id="form-content" rows="6" placeholder="☐ Checklist Item — Action" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 font-mono text-sm outline-none focus:border-sky-500"></textarea>
                        
                        <input type="file" id="form-file" class="hidden">
                        <div onclick="document.getElementById('form-file').click()" class="border-2 border-dashed border-white/10 rounded-2xl p-6 text-center cursor-pointer hover:border-sky-500 transition-colors text-slate-500 uppercase font-bold text-xs">
                            <p id="file-info">Attach Media (PDF/IMG)</p>
                        </div>
                        
                        <div class="flex gap-4">
                            <button type="submit" id="submit-btn" class="flex-1 bg-sky-600 hover:bg-sky-500 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em] shadow-xl">Commit to Cloud</button>
                            <button type="button" onclick="switchPage('documents')" class="px-8 border border-white/10 rounded-2xl text-[10px] font-bold uppercase hover:bg-white/5">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- PREVIEW MODAL -->
    <div id="preview-modal" class="fixed inset-0 z-[200] hide flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closePreview()"></div>
        <div class="relative w-full max-w-5xl h-[85vh] glass rounded-3xl overflow-hidden flex flex-col shadow-2xl border border-white/10">
            <div class="flex items-center justify-between p-6 border-b border-white/5 bg-black/20 text-white uppercase"><div id="preview-meta"></div><button onclick="closePreview()" class="p-2 hover:bg-white/10 rounded-full transition-colors">✕</button></div>
            <div id="preview-content" class="flex-1 overflow-auto p-8"></div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[1000] flex flex-col gap-3"></div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbx55eG9VLX6v6lg7FWQpr1rFTwTXs_YnUJ0GcogY8a-nLfdZ1dd0iD5mPwTdQvojJEG/exec";
        
        let appData = [], selectedModel = null, selectedType = null, selectedFileBase64 = null, selectedFileName = "", selectedFileType = "";
        let isAdmin = false;
        let deferredPrompt;

        // --- PWA LOGIC START ---
        // 1. Generate Manifest as Data URI
        const manifest = {
            "name": "SkyOps Pilot Checklist",
            "short_name": "SkyOps",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#020617",
            "theme_color": "#020617",
            "description": "Professional Aviation Protocol Suite",
            "icons": [
                {
                    "src": "https://lh3.googleusercontent.com/d/1maWW9xYa_TOAVTu_aiDmFZ5zX0U_e3DF",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blobManifest = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blobManifest);
        document.querySelector('#pwa-manifest').setAttribute('href', manifestURL);

        // 2. Register Inline Service Worker via Blob
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'skyops-v1';
                self.addEventListener('install', (event) => {
                    self.skipWaiting();
                });
                self.addEventListener('fetch', (event) => {
                    // Chrome requires a fetch handler for installability
                    event.respondWith(fetch(event.request).catch(() => {}));
                });
            `;
            const blobSW = new Blob([swCode], {type: 'text/javascript'});
            const swURL = URL.createObjectURL(blobSW);
            navigator.serviceWorker.register(swURL).catch(err => console.log("SW Reg Error:", err));
        }

        // 3. Handle Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('install-btn');
            installBtn.classList.remove('hide');
            
            installBtn.onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') installBtn.classList.add('hide');
                    deferredPrompt = null;
                }
            };
        });
        // --- PWA LOGIC END ---

        window.onload = () => {
            const tl = gsap.timeline();
            tl.to("#opening-subtitle", { opacity: 1, duration: 1.5, ease: "power2.out" });
            tl.to("#boot-bar", { width: "100%", duration: 2, ease: "power2.inOut" }, "-=1");
            tl.to("#opening-screen", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('opening-screen').classList.add('hide');
                document.getElementById('app').style.opacity = "1";
                fetchData();
            }});
        };

        function handleLogin() {
            const u = document.getElementById('login-u').value;
            const p = document.getElementById('login-p').value;
            if(u === 'admin' && p === 'ramdan28') {
                isAdmin = true;
                document.getElementById('user-nav').classList.add('hide');
                document.getElementById('admin-nav').classList.remove('hide');
                switchPage('documents');
                showToast("Admin Access Granted", "success");
            } else { showToast("Authentication Failed", "error"); }
        }

        function handleLogout() {
            isAdmin = false;
            document.getElementById('user-nav').classList.remove('hide');
            document.getElementById('admin-nav').classList.add('hide');
            switchPage('library');
            showToast("Logged out", "success");
        }

        async function fetchData() {
            showToast("Syncing mission databank...", "info");
            try {
                const cleanUrl = scriptUrl.trim();
                const res = await fetch(`${cleanUrl}?action=read&t=${Date.now()}`);
                if (!res.ok) throw new Error("Server Error");
                const json = await res.json();
                if (json.status === "success") {
                    appData = json.data || [];
                    renderDocuments();
                    if (selectedModel && selectedType) selectFleetType(selectedType);
                    showToast(`System Synced: ${appData.length} records ready`, "success");
                } else { throw new Error(json.message); }
            } catch (e) { 
                console.error("Fetch Error:", e);
                showToast("Databank Link Failure.", "error"); 
            }
        }

        function renderDocuments() {
            const tbody = document.getElementById('document-table-body');
            tbody.innerHTML = appData.map(item => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-4"><div class="text-[9px] font-bold text-sky-500 uppercase tracking-widest">${item.aircraftModel || '-'} / ${item.aircraftType || '-'}</div></td>
                    <td class="p-4 font-semibold uppercase text-xs text-slate-300">${item.title}</td>
                    <td class="p-4 text-right">
                        <button onclick="editItem('${item.id}')" class="text-sky-400 hover:text-sky-300 mr-4 font-bold text-[10px] uppercase">Edit</button>
                        <button onclick="deleteItem('${item.id}')" class="text-red-500 hover:text-red-400 font-bold text-[10px] uppercase">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function switchPage(page) {
            ['library', 'documents', 'add', 'login'].forEach(p => {
                const el = document.getElementById(`page-${p}`);
                const nav = document.getElementById(`nav-${p}`);
                if(el) el.classList.add('hide');
                if(nav) nav.classList.remove('active');
            });
            const targetPage = document.getElementById(`page-${page}`);
            const targetNav = document.getElementById(`nav-${page}`);
            if(targetPage) targetPage.classList.remove('hide');
            if(targetNav) targetNav.classList.add('active');
            
            if(page === 'add' && !document.getElementById('form-id').value) {
                document.getElementById('protocol-form').reset();
                document.getElementById('form-heading').innerText = "INITIALIZE PROTOCOL";
                document.getElementById('file-info').innerText = "Attach Media (PDF/IMG)";
                selectedFileBase64 = null;
            }
            if(page === 'library') resetFleetModel();
        }

        function selectFleetModel(model) {
            selectedModel = model;
            const container = document.getElementById('type-button-grid');
            document.getElementById('type-selection-title').innerText = `SELECT ${model.toUpperCase()} TYPE`;
            const typesFromData = [...new Set(appData.filter(i => (i.aircraftModel || i.AircraftModel) === model).map(i => i.aircraftType || i.AircraftType))];
            const defaults = model === 'Helicopter' ? ["Bell 412 EP", "AW109"] : ["Gulfstream IV", "Beechcraft King Air 300", "NC 212-200"];
            const combinedTypes = [...new Set([...defaults, ...typesFromData])].filter(t => t && t !== "undefined" && t !== "");
            container.innerHTML = combinedTypes.map(type => `<button onclick="selectFleetType('${type}')" class="type-btn p-6 rounded-2xl text-center font-bold text-[10px] uppercase tracking-widest h-24 flex items-center justify-center">${type}</button>`).join('');
            document.getElementById('selection-model').classList.add('hide');
            document.getElementById('selection-type').classList.remove('hide');
        }

        function resetFleetModel() {
            selectedModel = null; selectedType = null;
            document.getElementById('selection-model').classList.remove('hide');
            document.getElementById('selection-type').classList.add('hide');
            document.getElementById('checklist-results').classList.add('hide');
        }

        function selectFleetType(type) {
            selectedType = type;
            const buttons = document.querySelectorAll('.type-btn');
            buttons.forEach(btn => btn.classList.toggle('active', btn.innerText.trim() === type.toUpperCase()));
            const filtered = appData.filter(i => (i.aircraftModel || i.AircraftModel) === selectedModel && (i.aircraftType || i.AircraftType) === type);
            const renderTabs = (items, containerId) => {
                document.getElementById(containerId).innerHTML = items.map(item => `
                    <button onclick='openPreview(${JSON.stringify(item)})' class="tab-btn ${item.type.toLowerCase()} p-4 rounded-xl text-left h-20 flex flex-col justify-end group transition-all hover:border-white/20">
                        <span class="text-[8px] font-bold opacity-30 uppercase tracking-tighter">${item.section}</span>
                        <h4 class="text-[10px] font-bold leading-tight uppercase group-hover:text-white line-clamp-1">${item.title}</h4>
                    </button>
                `).join('') || `<p class="text-[9px] text-slate-600 col-span-full italic text-center py-4 tracking-widest">No protocols found.</p>`;
            };
            renderTabs(filtered.filter(i => i.type === 'Emergency'), 'emergency-tabs');
            renderTabs(filtered.filter(i => i.type === 'Normal'), 'normal-tabs');
            document.getElementById('checklist-results').classList.remove('hide');
        }

        function updateFormTypeOptions(model) {
            const select = document.getElementById('form-aircraft-type-select');
            const list = model === 'Helicopter' ? ["Bell 412 EP", "AW109"] : ["Gulfstream IV", "Beechcraft King Air 300", "NC 212-200"];
            select.innerHTML = '<option value="" disabled selected>Select</option>' + list.map(t => `<option value="${t}">${t}</option>`).join('') + '<option value="MANUAL">+ Add Manual</option>';
        }

        function checkManualType(val) { document.getElementById('form-aircraft-type-manual').classList.toggle('hide', val !== 'MANUAL'); }

        function editItem(id) {
            const item = appData.find(i => i.id === id);
            if(!item) return;
            switchPage('add');
            document.getElementById('form-id').value = item.id;
            document.getElementById('form-aircraft-model').value = item.aircraftModel;
            updateFormTypeOptions(item.aircraftModel);
            const typeSelect = document.getElementById('form-aircraft-type-select');
            if (["Bell 412 EP", "AW109", "Gulfstream IV", "Beechcraft King Air 300", "NC 212-200"].includes(item.aircraftType)) {
                typeSelect.value = item.aircraftType;
            } else {
                typeSelect.value = "MANUAL";
                document.getElementById('form-aircraft-type-manual').classList.remove('hide');
                document.getElementById('form-aircraft-type-manual').value = item.aircraftType;
            }
            document.getElementById('form-section').value = item.section;
            document.getElementById('form-type').value = item.type;
            document.getElementById('form-title').value = item.title;
            document.getElementById('form-content').value = item.content;
            document.getElementById('form-heading').innerText = "MODIFY PROTOCOL";
            selectedFileBase64 = null;
            document.getElementById('file-info').innerText = item.fileUrl ? "Existing Media Active" : "Attach Media";
        }

        document.getElementById('protocol-form').onsubmit = function(e) {
            e.preventDefault();
            const typeVal = document.getElementById('form-aircraft-type-select').value;
            const finalType = typeVal === 'MANUAL' ? document.getElementById('form-aircraft-type-manual').value : typeVal;
            const payload = {
                action: document.getElementById('form-id').value ? 'update' : 'create',
                id: document.getElementById('form-id').value,
                aircraftModel: document.getElementById('form-aircraft-model').value,
                aircraftType: finalType,
                section: document.getElementById('form-section').value,
                type: document.getElementById('form-type').value,
                title: document.getElementById('form-title').value,
                content: document.getElementById('form-content').value,
                fileName: selectedFileName, fileMime: selectedFileType, fileData: selectedFileBase64
            };
            showToast("Syncing in background...", "success");
            switchPage('documents');
            fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.json()).then(result => { if(result.status === 'success') { showToast("Synced", "success"); fetchData(); } })
                .catch(err => showToast("Sync failed", "error"));
        };

        function openPreview(item) {
            document.getElementById('preview-meta').innerHTML = `<p class="text-[9px] text-sky-500 font-bold uppercase tracking-widest">${item.aircraftModel} / ${item.aircraftType} // ${item.section}</p><h3 class="font-orbitron font-bold text-white tracking-tight uppercase">${item.title}</h3>`;
            let contentHtml = '';
            if (item.content) {
                contentHtml = `<div class="space-y-4 font-mono text-sm uppercase">` + 
                    item.content.split('\n').map(l => {
                        const trimmed = l.trim();
                        if(trimmed.includes('☐')) return `<div class="p-4 glass rounded-xl font-bold text-xs flex items-center gap-4 cursor-pointer hover:bg-white/5 transition-colors" onclick="this.style.opacity=0.3"><div class="w-4 h-4 border border-slate-700 rounded"></div>${trimmed.replace('☐','')}</div>`;
                        if(trimmed.includes('⚠') || trimmed.toUpperCase().includes('CAUTION')) return `<div class="p-5 bg-orange-500/10 text-orange-500 italic text-xs my-4 border-l-4 border-orange-500 rounded-r-xl">${trimmed}</div>`;
                        return `<p class="text-slate-500 text-[10px] px-2 opacity-60 tracking-wider">${trimmed}</p>`;
                    }).join('') + `</div>`;
            } else if (item.fileUrl) {
                contentHtml = item.fileType.includes('pdf') ? `<iframe src="${item.fileUrl}" class="w-full h-full border-none min-h-[60vh] rounded-2xl"></iframe>` : `<img src="${item.fileUrl}" class="max-w-full mx-auto rounded-2xl shadow-2xl">`;
            }
            document.getElementById('preview-content').innerHTML = contentHtml;
            document.getElementById('preview-modal').classList.remove('hide');
        }

        function closePreview() { document.getElementById('preview-modal').classList.add('hide'); }

        document.getElementById('form-file').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            selectedFileName = file.name; selectedFileType = file.type;
            const reader = new FileReader();
            reader.onload = (ev) => { selectedFileBase64 = ev.target.result.split(',')[1]; document.getElementById('file-info').innerText = "LOADED: " + file.name; };
            reader.readAsDataURL(file);
        };

        async function deleteItem(id) {
            if(!confirm("Are you sure?")) return;
            showToast("Purging record...", "success");
            try { 
                const res = await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
                const json = await res.json();
                if (json.status === "success") { showToast("Deleted", "success"); fetchData(); }
            } catch (e) { showToast("Error", "error"); }
        }

        function showToast(m, t) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-2xl glass font-bold text-[9px] uppercase border tracking-[0.2em] shadow-2xl transition-all duration-500 translate-x-20 opacity-0 ${t==='success'?'text-green-500 border-green-500/20':t==='info'?'text-sky-500 border-sky-500/20':'text-red-500 border-red-500/20'}`;
            toast.innerText = m; 
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-20', 'opacity-0'); }, 100);
            setTimeout(() => { toast.classList.add('translate-x-20', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 3500);
        }
    </script>
</body>
</html>
