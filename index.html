<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyOps Pilot Checklist | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0ea5e9; --emergency: #ef4444; --bg: #020617; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .model-card { background: linear-gradient(135deg, rgba(15, 23, 42, 0.4), rgba(2, 6, 23, 0.8)); border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s; cursor: pointer; }
        .model-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(14, 165, 233, 0.1); }
        .tab-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s; }
        .tab-btn.emergency::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background: var(--emergency); }
        .tab-btn.normal::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background: var(--primary); }
        .hide { display: none !important; }
        .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body>

    <!-- Layar Pembuka (Booting) dengan Sub Judul Baru -->
    <div id="opening-screen" class="fixed inset-0 z-[1000] bg-[#020617] flex flex-col items-center justify-center">
        <h1 class="font-orbitron text-4xl font-bold tracking-[0.3em] text-white">SKYOPS</h1>
        <!-- Sub Judul Pilot Checklist System -->
        <p id="opening-subtitle" class="font-orbitron text-[10px] tracking-[0.4em] text-sky-500 uppercase mt-2 opacity-0">Pilot Checklist System</p>
        
        <div class="w-48 h-[1px] bg-slate-900 mt-10 overflow-hidden rounded-full">
            <div id="boot-bar" class="w-0 h-full bg-sky-500 shadow-[0_0_10px_#0ea5e9]"></div>
        </div>
    </div>

    <div id="app" class="opacity-0 min-h-screen pt-20 pb-10">
        <!-- Header Navigasi -->
        <nav class="fixed top-0 inset-x-0 h-16 glass z-50 flex items-center justify-between px-6">
            <span class="font-orbitron font-bold text-lg tracking-tighter uppercase">SkyOps</span>
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
                <button onclick="switchPage('library')" id="nav-library" class="nav-link active">Library</button>
                <button onclick="switchPage('documents')" id="nav-documents" class="nav-link">Databank</button>
                <button onclick="switchPage('add')" id="nav-add" class="nav-link">Initialize</button>
                <button onclick="fetchData()" class="text-slate-500 hover:text-sky-400">Sync</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6">
            <!-- HALAMAN: PILIHAN MODEL (LIBRARY) -->
            <div id="page-library" class="space-y-12">
                <div id="selection-model" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto pt-10">
                    <div onclick="selectFleetModel('Helicopter')" class="model-card p-16 rounded-3xl text-center">
                        <h3 class="font-orbitron text-3xl font-bold tracking-widest uppercase">HELICOPTER</h3>
                        <p class="text-[10px] text-slate-500 uppercase mt-4 tracking-[0.3em]">Rotary Wing Fleet</p>
                    </div>
                    <div onclick="selectFleetModel('Fixedwing')" class="model-card p-16 rounded-3xl text-center">
                        <h3 class="font-orbitron text-3xl font-bold tracking-widest uppercase">FIXEDWING</h3>
                        <p class="text-[10px] text-slate-500 uppercase mt-4 tracking-[0.3em]">Fixed Wing Fleet</p>
                    </div>
                </div>

                <div id="selection-type" class="hide max-w-md mx-auto space-y-6">
                    <button onclick="resetFleetModel()" class="text-[10px] font-bold text-slate-500 hover:text-sky-400 uppercase tracking-widest flex items-center gap-2">← Back to Fleet Selection</button>
                    <select id="library-type-dropdown" onchange="selectFleetType(this.value)" class="w-full bg-slate-900 border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold appearance-none outline-none focus:border-sky-500"></select>
                </div>

                <div id="checklist-results" class="hide space-y-10">
                    <div id="res-emergency">
                        <h2 class="font-orbitron text-red-500 text-xs font-bold mb-6 uppercase tracking-widest">Emergency Protocols</h2>
                        <div id="emergency-tabs" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
                    </div>
                    <div id="res-normal">
                        <h2 class="font-orbitron text-sky-500 text-xs font-bold mb-6 uppercase tracking-widest">Normal Checklist</h2>
                        <div id="normal-tabs" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
                    </div>
                </div>
            </div>

            <!-- HALAMAN: DATABANK (Registry List) -->
            <div id="page-documents" class="hide space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="font-orbitron text-xl font-bold uppercase tracking-widest">Registry Databank</h2>
                    <button onclick="switchPage('add')" class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all shadow-lg shadow-sky-900/20">
                        + Add Record
                    </button>
                </div>
                <div class="glass rounded-2xl overflow-hidden overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white/5 text-[10px] uppercase font-bold text-slate-500 tracking-widest">
                            <tr>
                                <th class="p-4">Reference</th>
                                <th class="p-4">Title</th>
                                <th class="p-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="document-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- HALAMAN: INITIALIZE (Form Input) -->
            <div id="page-add" class="hide max-w-3xl mx-auto">
                <div class="glass rounded-3xl p-8 space-y-6">
                    <h2 id="form-heading" class="font-orbitron text-2xl font-bold text-center tracking-widest uppercase">Initialize Protocol</h2>
                    <form id="protocol-form" class="space-y-4">
                        <input type="hidden" id="form-id">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Fleet Model</label>
                                <select id="form-aircraft-model" required onchange="updateFormTypeOptions(this.value)" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500">
                                    <option value="" disabled selected>Select Model</option>
                                    <option value="Helicopter">Helicopter</option>
                                    <option value="Fixedwing">Fixedwing</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase px-1">Fleet Type</label>
                                <select id="form-aircraft-type-select" onchange="checkManualType(this.value)" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500">
                                    <option value="" disabled selected>Select Type</option>
                                </select>
                                <input type="text" id="form-aircraft-type-manual" placeholder="Input manual type" class="hide w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 mt-2 outline-none focus:border-sky-500">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="form-section" placeholder="Section" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500">
                            <select id="form-type" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500">
                                <option value="Normal">Normal</option>
                                <option value="Emergency">Emergency</option>
                            </select>
                        </div>
                        <input type="text" id="form-title" placeholder="Procedure Title" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500">
                        <textarea id="form-content" rows="6" placeholder="☐ Checklist Item" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3 font-mono text-sm outline-none focus:border-sky-500"></textarea>
                        
                        <input type="file" id="form-file" class="hidden">
                        <div onclick="document.getElementById('form-file').click()" class="border-2 border-dashed border-white/10 rounded-2xl p-6 text-center cursor-pointer hover:border-sky-500 transition-colors text-slate-500 uppercase font-bold text-xs">
                            <p id="file-info">Attach Media (PDF/IMG)</p>
                        </div>
                        
                        <div class="flex gap-4">
                            <button type="submit" id="submit-btn" class="flex-1 bg-sky-600 hover:bg-sky-500 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-[0.2em] transition-all shadow-xl shadow-sky-900/20">Commit to Cloud</button>
                            <button type="button" onclick="switchPage('documents')" id="cancel-btn" class="hide px-8 border border-white/10 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white/5 transition-all">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- PREVIEW MODAL -->
    <div id="preview-modal" class="fixed inset-0 z-[200] hide flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closePreview()"></div>
        <div class="relative w-full max-w-5xl h-[85vh] glass rounded-3xl overflow-hidden flex flex-col shadow-2xl border border-white/10">
            <div class="flex items-center justify-between p-6 border-b border-white/5 bg-black/20 text-white uppercase">
                <div id="preview-meta"></div>
                <button onclick="closePreview()" class="p-2 hover:bg-white/10 rounded-full transition-colors">✕</button>
            </div>
            <div id="preview-content" class="flex-1 overflow-auto p-8"></div>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxlD9qnYOxYhXRXXGOH8pQ1W06mFTorKcbGtjsuLvZWPmtAuyCKX3ZoeLUGa1tRbHw/exec";
        let appData = [], selectedModel = null, selectedType = null, selectedFileBase64 = null, selectedFileName = "", selectedFileType = "";

        window.onload = () => {
            // Animasi opening yang lebih elegan
            const tl = gsap.timeline();
            tl.to("#opening-subtitle", { opacity: 1, duration: 1.5, ease: "power2.out" });
            tl.to("#boot-bar", { width: "100%", duration: 2, ease: "power2.inOut" }, "-=1");
            tl.to("#opening-screen", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('opening-screen').classList.add('hide');
                document.getElementById('app').style.opacity = "1";
                fetchData();
            }});
        };

        async function fetchData() {
            try {
                const res = await fetch(`${scriptUrl}?action=read&t=${Date.now()}`);
                const json = await res.json();
                appData = json.data || [];
                renderDocuments();
                if (selectedModel && selectedType) selectFleetType(selectedType);
            } catch (e) { console.error("Fetch Error:", e); }
        }

        function renderDocuments() {
            const tbody = document.getElementById('document-table-body');
            tbody.innerHTML = appData.map(item => `
                <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="p-4"><div class="text-[9px] font-bold text-sky-500 uppercase">${item.aircraftModel} / ${item.aircraftType}</div></td>
                    <td class="p-4 font-semibold uppercase text-xs tracking-tighter">${item.title}</td>
                    <td class="p-4 text-right">
                        <button onclick="editItem('${item.id}')" class="text-sky-400 hover:text-sky-300 mr-4 font-bold text-[10px] uppercase">Edit</button>
                        <button onclick="deleteItem('${item.id}')" class="text-red-500 hover:text-red-400 font-bold text-[10px] uppercase">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function switchPage(page) {
            ['library', 'documents', 'add'].forEach(p => {
                document.getElementById(`page-${p}`).classList.add('hide');
                document.getElementById(`nav-${p}`).classList.remove('active');
            });
            document.getElementById(`page-${page}`).classList.remove('hide');
            document.getElementById(`nav-${page}`).classList.add('active');
            
            if(page === 'add') {
                document.getElementById('protocol-form').reset();
                document.getElementById('form-id').value = "";
                document.getElementById('form-heading').innerText = "INITIALIZE PROTOCOL";
                document.getElementById('cancel-btn').classList.add('hide');
                document.getElementById('form-aircraft-type-manual').classList.add('hide');
                document.getElementById('file-info').innerText = "Attach Media (PDF/IMG)";
                selectedFileBase64 = null;
            }
            if(page === 'library') resetFleetModel();
        }

        function selectFleetModel(model) {
            selectedModel = model;
            const dropdown = document.getElementById('library-type-dropdown');
            const types = [...new Set(appData.filter(i => i.aircraftModel === model).map(i => i.aircraftType))];
            dropdown.innerHTML = `<option value="" disabled selected>SELECT ${model.toUpperCase()} TYPE</option>` + 
                                types.map(t => `<option value="${t}">${t.toUpperCase()}</option>`).join('');
            document.getElementById('selection-model').classList.add('hide');
            document.getElementById('selection-type').classList.remove('hide');
        }

        function resetFleetModel() {
            document.getElementById('selection-model').classList.remove('hide');
            document.getElementById('selection-type').classList.add('hide');
            document.getElementById('checklist-results').classList.add('hide');
        }

        function selectFleetType(type) {
            selectedType = type;
            const filtered = appData.filter(i => i.aircraftModel === selectedModel && i.aircraftType === type);
            const renderTabs = (items, containerId) => {
                document.getElementById(containerId).innerHTML = items.map(item => `
                    <button onclick='openPreview(${JSON.stringify(item)})' class="tab-btn ${item.type.toLowerCase()} relative p-4 rounded-xl text-left h-20 flex flex-col justify-end group">
                        <span class="text-[8px] font-bold opacity-30 uppercase">${item.section}</span>
                        <h4 class="text-[10px] font-bold leading-tight uppercase group-hover:text-white line-clamp-1">${item.title}</h4>
                    </button>
                `).join('') || `<p class="text-[9px] text-slate-600 col-span-full italic">No protocols found.</p>`;
            };
            renderTabs(filtered.filter(i => i.type === 'Emergency'), 'emergency-tabs');
            renderTabs(filtered.filter(i => i.type === 'Normal'), 'normal-tabs');
            document.getElementById('checklist-results').classList.remove('hide');
        }

        function updateFormTypeOptions(model) {
            const select = document.getElementById('form-aircraft-type-select');
            const list = model === 'Helicopter' ? ["Bell 412 EP", "AW109"] : ["Gulfstream IV", "Beechcraft King Air 300", "NC 212-200"];
            select.innerHTML = '<option value="" disabled selected>Select Type</option>' + 
                                list.map(t => `<option value="${t}">${t}</option>`).join('') + 
                                '<option value="MANUAL">+ Add Manual</option>';
        }

        function checkManualType(val) {
            document.getElementById('form-aircraft-type-manual').classList.toggle('hide', val !== 'MANUAL');
        }

        function editItem(id) {
            const item = appData.find(i => i.id === id);
            if(!item) return;
            switchPage('add');
            document.getElementById('form-heading').innerText = "MODIFY PROTOCOL";
            document.getElementById('form-id').value = item.id;
            document.getElementById('form-aircraft-model').value = item.aircraftModel;
            updateFormTypeOptions(item.aircraftModel);
            const typeSelect = document.getElementById('form-aircraft-type-select');
            const standardTypes = ["Bell 412 EP", "AW109", "Gulfstream IV", "Beechcraft King Air 300", "NC 212-200"];
            if (standardTypes.includes(item.aircraftType)) {
                typeSelect.value = item.aircraftType;
            } else {
                typeSelect.value = "MANUAL";
                const manualInput = document.getElementById('form-aircraft-type-manual');
                manualInput.classList.remove('hide');
                manualInput.value = item.aircraftType;
            }
            document.getElementById('form-section').value = item.section;
            document.getElementById('form-type').value = item.type;
            document.getElementById('form-title').value = item.title;
            document.getElementById('form-content').value = item.content;
            document.getElementById('cancel-btn').classList.remove('hide');
        }

        document.getElementById('protocol-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Transmitting...";
            const typeSelect = document.getElementById('form-aircraft-type-select').value;
            const finalType = typeSelect === 'MANUAL' ? document.getElementById('form-aircraft-type-manual').value : typeSelect;
            const payload = {
                action: document.getElementById('form-id').value ? 'update' : 'create',
                id: document.getElementById('form-id').value,
                aircraftModel: document.getElementById('form-aircraft-model').value,
                aircraftType: finalType,
                section: document.getElementById('form-section').value,
                type: document.getElementById('form-type').value,
                title: document.getElementById('form-title').value,
                content: document.getElementById('form-content').value,
                fileName: selectedFileName, fileMime: selectedFileType, fileData: selectedFileBase64
            };
            try {
                const res = await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === 'success') {
                    switchPage('documents');
                    fetchData();
                } else { alert("Sync Error: " + result.message); }
            } catch (e) { alert("Network Sync Failure"); }
            finally { btn.disabled = false; btn.innerText = "Commit to Cloud"; }
        };

        function openPreview(item) {
            document.getElementById('preview-meta').innerHTML = `
                <p class="text-[9px] text-sky-500 font-bold uppercase tracking-widest">${item.aircraftModel} / ${item.aircraftType} // ${item.section}</p>
                <h3 class="font-orbitron font-bold uppercase text-white tracking-tight">${item.title}</h3>
            `;
            let contentHtml = '';
            if (item.content) {
                contentHtml = `<div class="space-y-4 font-mono text-sm uppercase">` + 
                    item.content.split('\n').map(l => {
                        const trimmed = l.trim();
                        if(trimmed.includes('☐')) return `<div class="p-4 glass rounded-xl font-bold text-xs flex items-center gap-4 cursor-pointer hover:bg-white/5 transition-colors" onclick="this.style.opacity=0.3"><div class="w-5 h-5 border border-slate-700 rounded flex-shrink-0"></div>${trimmed.replace('☐','')}</div>`;
                        if(trimmed.includes('⚠') || trimmed.toUpperCase().includes('CAUTION')) return `<div class="p-5 bg-orange-500/10 text-orange-500 italic text-xs my-4 border-l-4 border-orange-500 rounded-r-xl">${trimmed}</div>`;
                        return `<p class="text-slate-500 text-[10px] px-2 opacity-60">${trimmed}</p>`;
                    }).join('') + `</div>`;
            } else if (item.fileUrl) {
                contentHtml = item.fileType.includes('pdf') ? `<iframe src="${item.fileUrl}" class="w-full h-full border-none min-h-[60vh] rounded-2xl"></iframe>` : `<img src="${item.fileUrl}" class="max-w-full mx-auto rounded-2xl shadow-2xl">`;
            }
            document.getElementById('preview-content').innerHTML = contentHtml;
            document.getElementById('preview-modal').classList.remove('hide');
        }

        function closePreview() { document.getElementById('preview-modal').classList.add('hide'); }

        document.getElementById('form-file').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            selectedFileName = file.name; selectedFileType = file.type;
            const reader = new FileReader();
            reader.onload = (ev) => { 
                selectedFileBase64 = ev.target.result.split(',')[1]; 
                document.getElementById('file-info').innerText = "ATTACHED: " + file.name; 
            };
            reader.readAsDataURL(file);
        };

        async function deleteItem(id) {
            if(!confirm("Are you sure you want to permanently purge this record?")) return;
            try {
                await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }) });
                fetchData();
            } catch (e) { alert("Deletion failed"); }
        }
    </script>
</body>
</html>
